# based on https://github.com/husky/husky/blob/noetic-devel/husky_control/config/control.yaml
joint_state_controller:
  type: "joint_state_controller/JointStateController"
  publish_rate: 50

diff_drive_controller:
  type: "diff_drive_controller/DiffDriveController"
  left_wheel:  ['left_wheel']
  right_wheel: ['right_wheel']
  publish_rate: 50.0
  pose_covariance_diagonal:  [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]
  twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]
  cmd_vel_timeout: 0.5
  velocity_rolling_window_size: 2

  wheel_separation: 0.15   # meters, center-to-center distance between wheels
  wheel_radius: 0.033      # meters

  # Publish final output cmd_vel
  publish_cmd: true

  # Base frame_id
  base_frame_id: base_link

  # Odometry fused with IMU is published by robot_localization, so
  # no need to publish a TF based on encoders alone.
  enable_odom_tf: false

  linear:
    x:
      has_velocity_limits    : true
      max_velocity           : 1.0   # m/s
      has_acceleration_limits: false
  angular:
    z:
      has_velocity_limits    : true
      max_velocity           : 4.0   # rad/s
      has_acceleration_limits: false
